<h2>{{ post.title }}</h2>
<p>작성일: {{ post.created_at|date:"Y년 m월 d일 A g:i" }}</p> 
<hr>

{% if post.image %}
    <div style="margin-bottom: 20px;">
        <img src="{{ post.image.url }}" alt="post_image" style="max-width: 400px;">
    </div>
{% endif %}

<div class="content" style="margin: 20px 0;">
    <p>{{ post.content|linebreaks }}</p>
</div>

<hr>

<a href="{% url 'delete' post.id %}" onclick="return confirm('정말 삭제하시겠습니까?');" style="color: red;">삭제하기</a>
|
<a href="{% url 'home' %}">목록으로 돌아가기</a>
