<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>게시글 상세</title>
</head>
<body>
    <h1>게시글 상세</h1>

    <hr>

    <h2>{{ post.title }}</h2>
    <p>{{ post.content }}</p>
    <p>{{ post.created_at }}</p>

    {% if post.image %}
        <img src="{{ post.image.url }}" width="300">
    {% endif %}

    <hr>

    <a href="{% url 'list' %}">목록으로</a>
</body>
</html>
