<body>
    {% if request.user.is_authenticated %}
        <p>{{ request.user.username }}님 환영합니다!</p>
        <a href="{% url 'write' %}">글쓰기</a>
        <a href="{% url 'logout' %}">로그아웃</a>
    {% else %}
        <a href="{% url 'login' %}">로그인</a>
        <a href="{% url 'signup' %}">회원가입</a>
    {% endif %}

    {% block content %}
    {% endblock %}
</body>
