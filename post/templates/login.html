<h2>로그인</h2>

<form method="POST">
    {% csrf_token %}
    
    <label>아이디</label><br>
    <input type="text" name="username" placeholder="아이디 입력"><br><br>

    <label>비밀번호</label><br>
    <input type="password" name="password" placeholder="비밀번호 입력"><br><br>

    <button type="submit">로그인</button>
</form>

<p>계정이 없으신가요?</p>
<a href="{% url 'signup' %}">회원가입</a>
