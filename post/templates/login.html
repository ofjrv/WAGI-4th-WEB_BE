<style>
    /* 가입 페이지와 동일한 .auth-container, .auth-title 등 스타일 사용 */
    .auth-container {
        max-width: 400px;
        margin: 50px auto;
        padding: 30px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-family: sans-serif;
    }
    .auth-title {
        font-size: 20px;
        font-weight: bold;
        margin-bottom: 20px;
        text-align: center;
    }
    .auth-form input {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box;
    }
    .btn-login {
        width: 100%;
        padding: 12px;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 4px;
        font-weight: bold;
        cursor: pointer;
    }
    .auth-link {
        display: block;
        text-align: center;
        margin-top: 20px;
        font-size: 14px;
        color: #666;
        text-decoration: none;
    }
</style>

<div class="auth-container">
    <div class="auth-title">로그인</div>
    
    <form method="POST">
        {% csrf_token %}
        <input type="text" name="username" placeholder="아이디" required autofocus>
        <input type="password" name="password" placeholder="비밀번호" required>
        <button type="submit" class="btn-login">로그인</button>
    </form>
    
    <a href="{% url 'signup' %}" class="auth-link">아직 계정이 없으신가요? 회원가입</a>
    <a href="{% url 'home' %}" class="auth-link" style="font-size: 12px;">홈으로 돌아가기</a>
</div>
