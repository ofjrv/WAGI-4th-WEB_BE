{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        body {
            margin: 0; padding: 0; font-family: 'Inter', sans-serif; min-height: 100vh;
            /* 배경 무한 반복 설정 */
            background: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.1)), url("{% static 'kiikii.jpg' %}");
            background-size: auto 100vh; background-repeat: repeat; background-position: center top; background-attachment: fixed;
            display: flex; justify-content: center; align-items: center;
        }

        .login-container {
            width: 380px; 
            background: rgba(255, 255, 255, 0.45); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: 35px; padding: 40px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.2); 
            text-align: center;
            box-sizing: border-box;
        }

        h2 { font-size: 2.8rem; font-weight: 900; color: #000; margin-bottom: 25px; letter-spacing: -1.5px; }

        /* 장고 {{ form.as_p }} 내부 태그들 스타일링 */
        form p {
            text-align: left;
            margin-bottom: 15px;
        }

        form label {
            display: block;
            font-weight: 700;
            font-size: 0.85rem;
            margin-bottom: 5px;
            color: #333;
            margin-left: 5px;
        }

        form input {
            width: 100%; padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.5);
            background: rgba(255,255,255,0.8); box-sizing: border-box; 
            font-size: 1rem; font-weight: 600; outline: none; transition: 0.2s;
        }

        form input:focus {
            border-color: #ff1493;
            background: #fff;
        }

        button {
            width: 100%; padding: 15px; border-radius: 15px; border: none; 
            background: #1d1d1f; color: #fff; font-weight: 800; font-size: 1rem;
            cursor: pointer; transition: 0.3s; margin-top: 10px;
        }

        button:hover {
            background: #ff1493;
            transform: scale(1.03);
            box-shadow: 0 5px 15px rgba(255, 20, 147, 0.3);
        }

        hr { border: none; border-top: 1px solid rgba(0,0,0,0.1); margin: 25px 0; }

        .info-text { font-size: 0.85rem; color: #555; font-weight: 600; }
    </style>

</head>
<body>

    <div class="login-container">
        <h2>로그인</h2>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">로그인</button>
        </form>

        <hr>
        <p class="info-text">아이디와 비밀번호를 입력해주세요.</p>
    </div>

</body>
</html>
