<!DOCTYPE html>
<html>
<head>
    <title>게시판 목록</title>
</head>
<body>
    <h1>게시판 목록</h1>
    <a href="{% url 'post:write' %}">새 글 쓰기</a>
    <hr>

    {% for post in posts %}
        <div>
            <h3><a href="{% url 'post:detail' post.pk %}">{{ post.title }}</a></h3>
            <p>{{ post.created_at }}</p>
            {% if post.image %}
                <img src="{{ post.image.url }}" width="200">
            {% endif %}
        </div>
        <hr>
    {% endfor %}
</body>
</html>
