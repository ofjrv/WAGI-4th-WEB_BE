{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>글 수정하기</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');

        body {
            margin: 0; padding: 0; font-family: 'Inter', sans-serif; min-height: 100vh;
            /* 배경 무한 반복으로 하단 빈 공간 방지 */
            background-image: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.1)), url("{% static 'kiikii.jpg' %}");
            background-size: auto 100vh; background-repeat: repeat; background-position: center top; background-attachment: fixed;
            display: flex; justify-content: center; align-items: flex-start;
        }

        .update-container {
            width: 500px; margin: 60px 20px; background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-radius: 35px; padding: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            box-sizing: border-box;
        }

        h1 { font-size: 2.5rem; font-weight: 900; color: #000; margin-bottom: 30px; letter-spacing: -1.5px; text-align: center; }

        
        form { display: flex; flex-direction: column; gap: 15px; }

        .label-text { font-weight: 700; color: #1d1d1f; margin-left: 5px; margin-bottom: -5px; display: block; }

        input[type="text"], textarea {
            width: 100%; padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.5);
            background: rgba(255,255,255,0.8); box-sizing: border-box; 
            font-size: 1rem; font-weight: 600; outline: none; transition: 0.2s;
            font-family: 'Inter', sans-serif;
        }

        textarea { height: 250px; resize: none; line-height: 1.6; }

        input[type="text"]:focus, textarea:focus {
            border-color: #ff1493;
            background: #fff;
            box-shadow: 0 0 10px rgba(255, 20, 147, 0.1);
        }

        button {
            width: 100%; padding: 15px; border-radius: 15px; border: none; 
            background: #1d1d1f; color: #fff; font-weight: 800; font-size: 1rem;
            cursor: pointer; transition: 0.3s; margin-top: 10px;
        }

        button:hover {
            background: #ff1493;
            transform: scale(1.03);
            box-shadow: 0 5px 15px rgba(255, 20, 147, 0.3);
        }

        .cancel-link {
            display: block; text-align: center; margin-top: 20px;
            color: #555; text-decoration: none; font-weight: 600; font-size: 0.9rem;
        }
        .cancel-link:hover { color: #ff1493; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="update-container">
        <h1>글 수정하기</h1>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            {{ post_form.as_p }}

            <hr>

            <div class="image-edit-section">
                <h3>🖼 현재 등록된 사진 관리</h3>
                <p style="font-size: 0.8rem; color: #888;">삭제하고 싶은 사진을 체크하세요.</p>
                <div style="display: flex; gap: 15px; flex-wrap: wrap;">
                    {% for photo in post.images.all %}
                        <div style="text-align: center; border: 1px solid #ddd; padding: 10px; border-radius: 8px;">
                            <img src="{{ photo.image.url }}" width="120" style="border-radius: 5px; display: block; margin-bottom: 5px;">
                            <label style="font-size: 0.9rem; cursor: pointer;">
                                <input type="checkbox" name="delete_images" value="{{ photo.id }}"> 삭제
                            </label>
                        </div>
                    {% empty %}
                        <p>등록된 사진이 없습니다.</p>
                    {% endfor %}
                </div>
            </div>

            <hr>

            <div class="new-image-section" style="margin-top: 20px;">
                <h3>➕ 새 사진 추가하기</h3>
                <input type="file" name="new_images" multiple>
            </div>

            <div style="margin-top: 30px;">
                <button type="submit">수정 완료하기</button>
            </div>
        </form>

        <a href="{% url 'post:detail' post.pk %}" class="cancel-link">수정 취소하고 돌아가기</a>
    </div>

</body>
</html>
