<!DOCTYPE html>
<html>
<head>
    <title>{{ post.title }} - 상세보기</title>
</head>
<body>
    <h1>{{ post.title }}</h1>
    <p>작성일: {{ post.created_at }}</p>
    <hr>

    {% if post.image %}
        <div style="margin-bottom: 20px;">
            <img src="{{ post.image.url }}" alt="게시글 이미지" style="max-width: 500px;">
        </div>
    {% endif %}

    <div style="white-space: pre-wrap;">
        {{ post.content }}
    </div>

    <hr>
    <a href="{% url 'post:list' %}">목록으로 돌아가기</a>
</body>
</html>
