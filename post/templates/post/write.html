<!DOCTYPE html>
<html>
<head>
    <title>글쓰기</title>
</head>
<body>
    <h1>새 글 작성하기</h1>
    <form action="" method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <p>제목: <input type="text" name="title"></p>
        <p>내용: <textarea name="content"></textarea></p>
        <p>이미지: <input type="file" name="images" multiple></p>
        <button type="submit">작성하기</button>
    </form>
</body>
</html>
