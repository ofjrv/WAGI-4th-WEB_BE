{% extends 'base.html' %}

{% block content %}

<h2>글 목록</h2>

<hr>

{% for post in posts %}
    <div>
        <a href="{% url 'detail' post.pk %}">{{ post.title }}</a><br>
        <small>작성자: {{ post.author.username }}</small><br>
        <small>작성일: {{ post.created_at }}</small>
    </div>
    <hr>
{% endfor %}

{% endblock %}
