<style>
    .container { max-width: 600px; margin: 20px auto; font-family: sans-serif; }
    form input[type="text"], form textarea {
        display: block; width: 100%; margin-bottom: 15px; padding: 10px; box-sizing: border-box;
    }
    textarea { height: 200px; }
    
    /* 기존 이미지 관리 영역 스타일 */
    .image-management {
        display: flex; flex-wrap: wrap; gap: 15px; margin: 20px 0;
    }
    .image-item {
        border: 1px solid #ddd; padding: 10px; text-align: center; border-radius: 5px;
    }
    .image-item img { display: block; margin-bottom: 8px; border-radius: 3px; }
    .delete-label { font-size: 13px; color: #dc3545; font-weight: bold; cursor: pointer; }

    .btn-submit {
        padding: 12px 20px; background-color: #007bff; color: white;
        border: none; cursor: pointer; width: 100%; font-weight: bold; border-radius: 5px;
    }
    .btn-submit:hover { background-color: #0056b3; }
</style>

<div class="container">
    <h2>게시글 수정하기</h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        
        <label for="title">제목</label>
        <input type="text" id="title" name="title" value="{{ post.title }}" required>
        
        <label for="content">내용</label>
        <textarea id="content" name="content" required>{{ post.content }}</textarea>
        
        <hr>
        
        <label>📸 현재 등록된 사진 (삭제할 사진을 선택하세요)</label>
        <div class="image-management">
            {% for img in post.images.all %}
                <div class="image-item">
                    <img src="{{ img.image.url }}" width="120" height="120" style="object-fit: cover;">
                    <label class="delete-label">
                        <input type="checkbox" name="delete_images" value="{{ img.id }}"> 삭제
                    </label>
                </div>
            {% empty %}
                <p style="color: #999;">등록된 사진이 없습니다.</p>
            {% endfor %}
        </div>

        <label for="images">➕ 새 사진 추가하기 (여러 장 가능)</label>
        <input type="file" id="images" name="images" multiple accept="image/*">
        
        <hr>
        
        <button type="submit" class="btn-submit">수정 완료</button>
    </form>

    <br>
    <a href="{% url 'detail' post.id %}" style="color: #666; text-decoration: none;">← 취소하고 돌아가기</a>
</div>
